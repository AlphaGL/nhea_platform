{% extends 'voting/main.html' %}
{% block title %}NHEA – Reset Password{% endblock %}
{% block header %}Reset Password{% endblock %}
{% block body %}
<style>
.rp-section { background: linear-gradient(160deg,#f0f7f4 0%,#fdf8f0 100%); min-height:calc(100vh - 220px); display:flex; align-items:center; padding:3rem 1rem; }
.rp-card { background:#fff; border-radius:20px; box-shadow:0 12px 50px rgba(10,79,60,0.1); border:1px solid var(--nhea-border); overflow:hidden; max-width:480px; width:100%; margin:0 auto; }
.rp-card-top { background:linear-gradient(135deg,#0369a1,#0ea5e9); padding:2.5rem 2rem; text-align:center; }
.rp-icon { width:72px;height:72px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.8rem;color:#fff; }
.rp-card-top h3 { color:#fff; font-size:1.6rem; margin-bottom:0.25rem; }
.rp-card-top p { color:rgba(255,255,255,0.65); font-size:0.88rem; margin:0; }
.rp-card-body { padding:2rem; }
.form-fields-container p { margin-bottom:1.35rem; }
.form-fields-container label { font-weight:600; font-size:0.88rem; color:var(--nhea-text); margin-bottom:0.4rem; display:block; }
.form-fields-container input { width:100%; padding:0.9rem 1.2rem; border:2px solid var(--nhea-border); border-radius:10px; background:var(--nhea-cream); font-family:'DM Sans',sans-serif; font-size:0.95rem; transition:all 0.3s; outline:none; }
.form-fields-container input:focus { border-color:var(--nhea-green); background:#fff; box-shadow:0 0 0 4px rgba(10,79,60,0.08); }
.form-fields-container .errorlist { list-style:none; padding:0; margin:0.35rem 0 0; }
.form-fields-container .errorlist li { background:#fef2f2; border:1px solid #fca5a5; color:#7f1d1d; border-radius:8px; padding:0.4rem 0.75rem; font-size:0.82rem; }
.btn-reset-nhea { width:100%; padding:1rem; background:linear-gradient(135deg,#0369a1,#0ea5e9); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.3s; box-shadow:0 6px 20px rgba(3,105,161,0.25); }
.btn-reset-nhea:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(3,105,161,0.4); }
</style>
<section class="rp-section">
<div class="container">
  <div class="rp-card" data-aos="fade-up">
    <div class="rp-card-top">
      <div class="rp-icon"><i class="fas fa-key"></i></div>
      <h3>Reset Your Password</h3>
      <p>Enter your Voter ID and a new password below</p>
    </div>
    <div class="rp-card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-fields-container">{{ form.as_p }}</div>
        <button type="submit" class="btn-reset-nhea">
          <i class="fas fa-lock me-2"></i>Update Password
        </button>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'login' %}" style="color:var(--nhea-green);font-weight:600;font-size:0.88rem;text-decoration:none;">
          <i class="fas fa-arrow-left me-1"></i>Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
</section>
{% endblock %}
